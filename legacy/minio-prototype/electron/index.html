<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MinIO Image Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">MINIO VIEWER</div>
          <h1>버킷 기반 이미지 탐색기</h1>
        </div>
        <div class="toolbar">
          <div id="bucketInfo" class="bucket-info">버킷을 선택하세요</div>
          <button id="refresh">새로고침</button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="panel-title">Files</div>
          <div id="bucketList" class="bucket-list"></div>
        </aside>

        <section class="workspace">
          <div class="filterbar">
            <label class="filter-field">
              <span>검색</span>
              <input id="filterText" type="text" placeholder="파일명, 제품번호, 태그" />
            </label>
            <label class="filter-field">
              <span>제품번호</span>
              <input id="filterProductNo" type="text" placeholder="PRD-100001" />
            </label>
            <label class="filter-field">
              <span>결과</span>
              <input id="filterResult" type="text" placeholder="PASS / FAIL / REVIEW" />
            </label>
            <label class="filter-field">
              <span>임계치 ≥</span>
              <input id="filterThresholdMin" type="number" step="0.01" inputmode="decimal" />
            </label>
            <label class="filter-field">
              <span>임계치 ≤</span>
              <input id="filterThresholdMax" type="number" step="0.01" inputmode="decimal" />
            </label>
            <button id="clearFilters" class="filter-clear">필터 초기화</button>
            <div id="filterInfo" class="filter-info">필터 없음</div>
          </div>

          <div class="columns">
            <section class="column">
              <div class="column-title">File</div>
              <div id="fileList" class="column-list"></div>
            </section>

            <section class="column">
              <div class="column-title">Metadata</div>
              <div id="metadataList" class="column-list"></div>
            </section>

            <section class="column">
              <div class="column-title">Tags</div>
              <div id="tagsList" class="column-list"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
